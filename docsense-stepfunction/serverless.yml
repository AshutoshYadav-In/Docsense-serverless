service: docsense-ingestion

frameworkVersion: "3"

plugins:
  - serverless-esbuild
  - serverless-step-functions

custom:
  esbuild:
    bundle: true
    minify: true
    target: node20
    platform: node
    sourcemap: false
    # Per-function bundle: extract only pulls s3+pdf-parse; embed/bulk skip pdf-parse (~largest dep)
    packages: bundle

provider:
  name: aws
  runtime: nodejs20.x
  region: ${env:AWS_REGION}
  memorySize: 512
  timeout: 60

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
          Resource:
            - arn:aws:s3:::*/*
        - Effect: Allow
          Action:
            - ssm:GetParameter
          Resource:
            - arn:aws:ssm:${aws:region}:${aws:accountId}:parameter/docsense-client-id
            - arn:aws:ssm:${aws:region}:${aws:accountId}:parameter/docsense-client-token
        - Effect: Allow
          Action:
            - kms:Decrypt
          Resource: arn:aws:kms:${aws:region}:${aws:accountId}:alias/aws/ssm

package:
  individually: true

functions:
  extractAndChunk:
    handler: functions/extractAndChunk/index.handler
    description: Download PDF from S3, extract text, chunk to 500 words

  embedChunk:
    handler: functions/embedChunk/index.handler
    description: POST chunk to Java /api/internal/embed (Map iterator)
    environment:
      JAVA_API_BASE_URL: ${env:JAVA_API_BASE_URL}

  bulkInsertAndComplete:
    handler: functions/bulkInsertAndComplete/index.handler
    description: POST bulk vectors to Java /api/internal/bulk-insert
    environment:
      JAVA_API_BASE_URL: ${env:JAVA_API_BASE_URL}

stepFunctions:
  stateMachines:
    DocSenseIngestion:
      # STANDARD: full execution history + Map iteration I/O in the console (Express does not).
      type: STANDARD
      name: DocSenseIngestion
      role:
        Fn::GetAtt:
          - DocSenseIngestionRole
          - Arn
      loggingConfig:
        level: ALL
        # Required for execution input/output in CloudWatch log deliveries (large / sensitive payloads: review retention).
        includeExecutionData: true
        destinations:
          - Fn::GetAtt:
              - DocSenseIngestionLogGroup
              - Arn
      definition: ${file(./statemachine/ingestion.json)}

resources:
  Resources:
    DocSenseIngestionLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/vendedlogs/states/docsense-ingestion
        RetentionInDays: 30

    DocSenseIngestionRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: states.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: DocSenseIngestionInvokeLambdas
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - lambda:InvokeFunction
                  Resource:
                    - Fn::GetAtt:
                        - ExtractAndChunkLambdaFunction
                        - Arn
                    - Fn::GetAtt:
                        - EmbedChunkLambdaFunction
                        - Arn
                    - Fn::GetAtt:
                        - BulkInsertAndCompleteLambdaFunction
                        - Arn
          - PolicyName: DocSenseIngestionLogsDelivery
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - logs:CreateLogDelivery
                    - logs:GetLogDelivery
                    - logs:UpdateLogDelivery
                    - logs:DeleteLogDelivery
                    - logs:ListLogDeliveries
                    - logs:PutLogEvents
                    - logs:PutResourcePolicy
                    - logs:DescribeResourcePolicies
                    - logs:DescribeLogGroups
                  Resource: "*"
